<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>NanoOrbit - Back Office</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-danger shadow-sm">
    <div class="container-fluid px-4">
        <a class="navbar-brand fw-bold text-white" href="#">NANOORBIT ADMIN</a>
        <div class="d-flex align-items-center text-white">
                <span class="me-3">
                    User : <strong th:text="${username}">User</strong>
                    (<span class="badge bg-light text-dark" th:text="${role}">Role</span>)
                </span>
            <a class="btn btn-sm btn-outline-light me-2" th:href="@{/dashboard}">Retour Dashboard</a>
            <a class="btn btn-sm btn-dark" th:href="@{/logout}">Déconnexion</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="row">

        <div class="col-md-4">
            <div class="card shadow-sm border-0 mb-4">
                <div class="card-header bg-dark text-white fw-bold">
                    Ajouter un Satellite
                </div>
                <div class="card-body">
                    <form method="post" th:action="@{/admin/satellites/ajouter}">
                        <div class="mb-3">
                            <label class="form-label small fw-bold" for="idSatellite">Identifiant (ex: SAT-099)</label>
                            <input class="form-control" id="idSatellite" name="idSatellite" required type="text">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold" for="nomSatellite">Nom de mission</label>
                            <input class="form-control" id="nomSatellite" name="nomSatellite" required type="text">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold" for="formatCubeSat">Format CubeSat</label>
                            <select class="form-select" id="formatCubeSat" name="formatCubeSat" required>
                                <option value="1U">1U</option>
                                <option value="3U">3U</option>
                                <option value="6U">6U</option>
                                <option value="12U">12U</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold" for="dateLancement">Date de Lancement</label>
                            <input class="form-control" id="dateLancement" name="dateLancement" required type="date">
                        </div>
                        <button class="btn btn-primary w-100 fw-bold" type="submit">Enregistrer en base</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white border-bottom py-3">
                    <h5 class="card-title mb-0 fw-bold text-secondary">Gestion des Satellites existants</h5>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive" th:if="${donnees != null and !donnees.isEmpty()}">
                        <table class="table table-hover table-striped mb-0 align-middle">
                            <thead class="table-dark">
                            <tr>
                                <th class="px-4">ID</th>
                                <th>Nom</th>
                                <th>Format</th>
                                <th>Date de lancement</th>
                                <th class="text-end px-4">Action</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="ligne : ${donnees}">
                                <td class="px-4 fw-bold text-muted"
                                    th:text="${ligne['id_satellite'] ?: ligne['ID_SATELLITE']}"></td>
                                <td th:text="${ligne['nom_satellite'] ?: ligne['NOM_SATELLITE']}"></td>
                                <td>
                                    <span class="badge bg-secondary"
                                          th:text="${ligne['format_cube_sat'] ?: ligne['FORMAT_CUBE_SAT']}"></span>
                                </td>
                                <td th:text="${ligne['date_lancement'] ?: ligne['DATE_LANCEMENT']}"></td>
                                <td class="text-end px-4">
                                    <form method="post" onsubmit="return confirm('Supprimer définitivement ce satellite ?');"
                                          th:action="@{/admin/satellites/supprimer}">
                                        <input name="idSatellite" th:value="${ligne['id_satellite'] ?: ligne['ID_SATELLITE']}"
                                               type="hidden">
                                        <button class="btn btn-sm btn-danger" type="submit">Supprimer</button>
                                    </form>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
