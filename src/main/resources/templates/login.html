<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>NanoOrbit - Connexion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            height: 100vh;
            display: flex;
            align-items: center;
        }

        .card-login {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">

            <div class="card card-login text-white shadow-lg rounded-3">
                <div class="card-header text-center border-0 pt-4 pb-0 bg-transparent">
                    <h2 class="fw-bold text-uppercase tracking-wide text-info mb-1">NanoOrbit</h2>
                    <p class="text-muted small">Earth Observation System</p>
                </div>

                <div class="card-body px-4 py-4">

                    <div class="alert alert-danger py-2 border-0 bg-danger bg-opacity-25 text-danger"
                         role="alert" th:if="${error != null}">
                        <span class="small" th:text="${error}">Erreur de connexion</span>
                    </div>

                    <div class="alert alert-success py-2 border-0 bg-success bg-opacity-25 text-success"
                         role="alert" th:if="${param.logout != null}">
                        <span class="small">Session clôturée avec succès.</span>
                    </div>

                    <form method="post" th:action="@{/login}">
                        <div class="mb-3">
                            <label class="form-label text-white-50 small" for="username">Compte Base de Données</label>
                            <input class="form-control bg-dark text-white border-secondary" id="username"
                                   name="username" placeholder="ex: operateur_sat" required type="text">
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-white-50 small" for="password">Mot de passe associé</label>
                            <input class="form-control bg-dark text-white border-secondary" id="password"
                                   name="password" placeholder="••••••••" required type="password">
                        </div>

                        <button class="btn btn-info w-100 fw-bold text-dark mt-3" type="submit">
                            Se connecter au système
                        </button>
                    </form>
                </div>

                <div class="card-footer text-center border-0 bg-transparent pb-3">
                    <span class="text-muted" style="font-size: 0.75rem;">Phase 5 - Efrei Binôme Petit / Zocli</span>
                </div>
            </div>

        </div>
    </div>
</div>
</body>
</html>
